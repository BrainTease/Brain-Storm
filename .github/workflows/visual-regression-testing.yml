name: Visual Regression Testing

on:
  pull_request:
    paths:
      - 'apps/frontend/**'
      - '.github/workflows/visual-regression-testing.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/frontend/**'

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: brain-storm-test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start backend
        run: |
          npm run dev:backend &
          sleep 10
        env:
          DATABASE_HOST: localhost
          DATABASE_NAME: brain-storm-test
          DATABASE_USERNAME: test
          DATABASE_PASSWORD: test

      - name: Start frontend
        run: |
          npm run dev:frontend &
          sleep 10

      - name: Run visual regression tests
        run: npm run test:visual --workspace=@brain-storm/frontend

      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: visual-regression-diffs
          path: apps/frontend/test-results/
          retention-days: 30

      - name: Comment PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const resultsPath = 'apps/frontend/test-results/visual-regression-results.json';
            
            if (fs.existsSync(resultsPath)) {
              const results = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
              const comment = `## Visual Regression Test Results\n\n${results.summary}`;
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment,
              });
            }
